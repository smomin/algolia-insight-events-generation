<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="alg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003DFF"/>
      <stop offset="100%" stop-color="#5468FF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#alg)"/>
  <!-- Algolia "a" lettermark -->
  <!-- Outer ring -->
  <circle cx="32" cy="33" r="14.5" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Inner dot -->
  <circle cx="32" cy="33" r="4" fill="white"/>
  <!-- Gap (top-right notch to mimic the Algolia "a" open counter) -->
  <rect x="39.5" y="20" width="6" height="5.5" rx="1" fill="url(#alg)"/>
  <!-- Stem on the right -->
  <rect x="43.5" y="23" width="4.5" height="20" rx="2" fill="white"/>
</svg>
